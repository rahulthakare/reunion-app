<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="0.55" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="petal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fde68a"/>
    </radialGradient>
  </defs>

  <!-- Rounded squircle background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Subtle highlight -->
  <ellipse cx="20" cy="14" rx="22" ry="10" fill="#ffffff" opacity="0.18"/>

  <!-- Smrutigandh flower (5-petal) at the top -->
  <g transform="translate(32 16)">
    <!-- 5 petals around center -->
    <ellipse cx="0" cy="-5" rx="3" ry="4.5" fill="url(#petal)"/>
    <ellipse cx="4.75" cy="-1.5" rx="3" ry="4.5" fill="url(#petal)" transform="rotate(72 4.75 -1.5)"/>
    <ellipse cx="2.95" cy="4" rx="3" ry="4.5" fill="url(#petal)" transform="rotate(144 2.95 4)"/>
    <ellipse cx="-2.95" cy="4" rx="3" ry="4.5" fill="url(#petal)" transform="rotate(216 -2.95 4)"/>
    <ellipse cx="-4.75" cy="-1.5" rx="3" ry="4.5" fill="url(#petal)" transform="rotate(288 -4.75 -1.5)"/>
    <!-- Flower center -->
    <circle r="2" fill="#f59e0b"/>
  </g>

  <!-- Two friends arm-in-arm (silhouettes) -->
  <g fill="#1e293b">
    <!-- LEFT friend -->
    <!-- Head -->
    <circle cx="22" cy="34" r="5"/>
    <!-- Body / shoulders -->
    <path d="M14 56 C14 47 17 42 22 42 C26 42 28 44 30 47 L30 56 Z"/>

    <!-- RIGHT friend -->
    <!-- Head -->
    <circle cx="42" cy="34" r="5"/>
    <!-- Body / shoulders -->
    <path d="M50 56 C50 47 47 42 42 42 C38 42 36 44 34 47 L34 56 Z"/>

    <!-- Arms around each other (overlap zone) -->
    <path d="M30 47 L34 47 L34 50 L30 50 Z"/>
  </g>

  <!-- Heart between heads (subtle friendship signal) -->
  <path d="M32 30 C30.5 28.5 27.5 28.5 27.5 31 C27.5 33 32 36 32 36 C32 36 36.5 33 36.5 31 C36.5 28.5 33.5 28.5 32 30 Z" fill="#fda4af" opacity="0.95"/>
</svg>
